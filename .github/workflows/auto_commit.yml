name: Pixel Art – Auto Commit

# Runs every day at 12:00 UTC (= 14:00 CEST / 13:00 CET).
# GitHub Actions keeps this running on GitHub's servers, so the Mac
# doesn't need to be switched on.
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # allows manual test runs from the Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push commits back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Fetch the full history so git push works cleanly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure Git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"

      - name: Run commit script
        run: python commit_script.py

      - name: Push commits (if any were made)
        run: |
          if ! git diff --quiet origin/$(git branch --show-current)..HEAD 2>/dev/null; then
            git push
          else
            echo "No new commits – nothing to push."
          fi
